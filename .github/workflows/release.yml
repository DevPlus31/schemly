name: Release

on:
  release:
    types: [created]

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-amd64
            use_cross: true
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: windows-arm64.exe
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4
      
      # Use rust-cache for faster build times
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary and prepare for upload
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/schemly.exe" "dist/schemly-${{ matrix.suffix }}"
            cp "target/${{ matrix.target }}/release/schemly_mcp.exe" "dist/schemly_mcp-${{ matrix.suffix }}"
          else
            cp "target/${{ matrix.target }}/release/schemly" "dist/schemly-${{ matrix.suffix }}"
            cp "target/${{ matrix.target }}/release/schemly_mcp" "dist/schemly_mcp-${{ matrix.suffix }}"
          fi

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/schemly*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

  publish-winget:
    name: Publish to Winget
    runs-on: ubuntu-latest
    needs: release
    if: "!contains(github.ref, '-')"
    steps:
      - name: Submit to Winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: DevPlus31.Schemly
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  publish-homebrew:
    name: Publish to Homebrew
    runs-on: ubuntu-latest
    needs: release
    if: "!contains(github.ref, '-')"
    steps:
      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TOKEN }}
          tap: DevPlus31/homebrew-tap
          formula: schemly
          force: false
