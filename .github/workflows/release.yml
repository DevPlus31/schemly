name: Release

on:
  release:
    types: [created]

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: schemly-linux-amd64
            use_cross: true
          
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: schemly-macos-amd64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: schemly-macos-arm64
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: schemly-windows-amd64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4
      
      # Use rust-cache for faster build times
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary and prepare for upload
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/schemly.exe" "dist/${{ matrix.artifact_name }}"
          else
            cp "target/${{ matrix.target }}/release/schemly" "dist/${{ matrix.artifact_name }}"
          fi

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          tag: ${{ github.ref }}
          overwrite: true
